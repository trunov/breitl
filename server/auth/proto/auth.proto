syntax = "proto3";

package auth.proto;

option go_package = "github.com/trunov/goph-keeper/server/auth/proto;proto";

service Auth {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Authenticate(AuthenticateRequest) returns (AuthenticateResponse);
}

message RegisterRequest {
string company_name = 1;
  string full_name = 2;
  string email = 3;
  string password = 4;
}

message RegisterResponse {
  string account_id = 1;
  string user_id = 2;
  string token = 3;
  string expires_at = 4;
}

message LoginRequest {
  string account_id = 1;
  string email = 2;
  string password = 3;
}

message LoginResponse {
  string token = 1;
  string expires_at = 2;
}

message AuthenticateRequest {
  string token = 1;
  string audience = 2;
}

message AuthenticateResponse {
  string user_id = 1;
  string account_id = 2;
  string email = 3;
  string full_name = 4;
  string role = 5;
  repeated string permissions = 6;
}